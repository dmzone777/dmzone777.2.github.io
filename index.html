<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra GLTF Compressor</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{

width:420px;
padding:25px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

border-radius:15px;
text-align:center;

box-shadow:0 0 25px rgba(0,0,0,0.6);

}

h2{
margin-bottom:15px;
}

input{
margin:10px 0;
}

button{

width:100%;
padding:12px;
margin-top:10px;

border:none;
border-radius:10px;

background:linear-gradient(90deg,#22c55e,#4ade80);
font-size:15px;
cursor:pointer;

}

#download{
display:none;
background:linear-gradient(90deg,#3b82f6,#60a5fa);
}

.stat{
margin-top:8px;
font-size:14px;
color:#94a3b8;
}

</style>

<script src="https://unpkg.com/@gltf-transform/core/dist/index.umd.js"></script>
<script src="https://unpkg.com/@gltf-transform/functions/dist/index.umd.js"></script>
<script src="https://unpkg.com/@gltf-transform/extensions/dist/index.umd.js"></script>

</head>

<body>

<div class="card">

<h2>Ultra GLTF Compressor</h2>

<input type="file" id="file">

<br>

<label>Texture Size</label>

<select id="tex">
<option value="2048">2048</option>
<option value="1024">1024</option>
<option value="512">512</option>
<option value="256">256</option>
</select>

<button onclick="compress()">Compress Model</button>

<button id="download" onclick="download()">Download</button>

<div class="stat" id="before"></div>
<div class="stat" id="after"></div>

</div>

<script>

let file
let outputBlob

document.getElementById("file").onchange=e=>{
file=e.target.files[0]
}

async function compress(){

if(!file){
alert("Upload model first")
return
}

const before=(file.size/1024/1024).toFixed(2)

document.getElementById("before").innerText=
"Original Size: "+before+" MB"

const buffer=await file.arrayBuffer()

const {NodeIO}=gltfTransformCore
const {dedup, prune, textureResize}=gltfTransformFunctions

const io=new NodeIO()

const doc=io.readBinary(new Uint8Array(buffer))

const tex=parseInt(document.getElementById("tex").value)

await doc.transform(
dedup(),
prune(),
textureResize({size:[tex,tex]})
)

const result=io.writeBinary(doc)

outputBlob=new Blob([result],{type:"model/gltf-binary"})

const after=(outputBlob.size/1024/1024).toFixed(2)

document.getElementById("after").innerText=
"Compressed Size: "+after+" MB"

document.getElementById("download").style.display="block"

}

function download(){

const url=URL.createObjectURL(outputBlob)

const a=document.createElement("a")

a.href=url
a.download="compressed.glb"

a.click()

}

</script>

</body>
</html>
