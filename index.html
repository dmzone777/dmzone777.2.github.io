<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate GLTF Optimizer</title>

<script src="https://unpkg.com/@gltf-transform/core/dist/index.umd.js"></script>
<script src="https://unpkg.com/@gltf-transform/functions/dist/index.umd.js"></script>

<style>

body{
font-family:Arial;
background:#111827;
color:white;
text-align:center;
padding:40px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
font-size:16px;
margin:10px;
cursor:pointer;
}

#downloadBtn{
display:none;
background:#3b82f6;
}

</style>
</head>

<body>

<h2>GLTF / GLB Optimizer</h2>

<input type="file" id="fileInput">

<br>

<label>Texture Size</label>
<br>
<select id="tex">
<option value="2048">2048</option>
<option value="1024">1024</option>
<option value="512">512</option>
</select>

<br><br>

<button onclick="optimize()">Optimize Model</button>

<br>

<button id="downloadBtn" onclick="downloadFile()">Download Optimized Model</button>

<p id="before"></p>
<p id="after"></p>

<script>

let uploadedFile;
let optimizedBlob;

document.getElementById("fileInput").onchange=e=>{
uploadedFile=e.target.files[0];
};

async function optimize(){

if(!uploadedFile){
alert("Upload model first");
return;
}

const before=(uploadedFile.size/1024/1024).toFixed(2);
document.getElementById("before").innerText="Original Size: "+before+" MB";

const buffer=await uploadedFile.arrayBuffer();

const {NodeIO}=gltfTransformCore;
const {dedup, textureResize, prune}=gltfTransformFunctions;

const io=new NodeIO();

const doc=io.readBinary(new Uint8Array(buffer));

const tex=parseInt(document.getElementById("tex").value);

await doc.transform(
dedup(),
textureResize({size:[tex,tex]}),
prune()
);

const result=io.writeBinary(doc);

optimizedBlob=new Blob([result],{type:"model/gltf-binary"});

const after=(optimizedBlob.size/1024/1024).toFixed(2);
document.getElementById("after").innerText="Optimized Size: "+after+" MB";

document.getElementById("downloadBtn").style.display="inline-block";

}

function downloadFile(){

if(!optimizedBlob) return;

const url=URL.createObjectURL(optimizedBlob);

const a=document.createElement("a");
a.href=url;
a.download="optimized-model.glb";
a.click();

}

</script>

</body>
</html>
